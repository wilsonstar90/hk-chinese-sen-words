<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="white" />
  <title>廣東話詞語</title>
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Disable ALL Safari touch/selection behaviours ───── */
    button, [role="button"], [tabindex] {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
    }

    /* ── Page ────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, 'PingFang HK', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── Settings button (top-right) ─────────────────────── */
    #settingsBtn {
      position: fixed;
      top: 18px; right: 18px;
      width: 56px; height: 56px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
    }
    #settingsBtn:active { background: #f0f0f0; }

    /* ── Category label (top-left) ───────────────────────── */
    #catLabel {
      position: fixed;
      top: 26px; left: 22px;
      font-size: 22px;
      font-weight: 700;
      color: #b0b0b0;
      z-index: 250;
    }

    /* ── Word display ────────────────────────────────────── */
    #wordWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
    }

    #wordEl {
      font-size: clamp(180px, 34vw, 420px);
      font-weight: 900;
      line-height: 1.05;
      user-select: none;
      -webkit-user-select: none;
      letter-spacing: 0.02em;
      display: flex;
      gap: 0.06em;
      white-space: nowrap;
    }

    /* each character */
    .char {
      color: #000;
      transition: color 0.12s ease, transform 0.12s ease;
      display: inline-block;
    }
    .char.active {
      color: #ff5a00;
      transform: scale(1.16);
    }

    /* pop-in animation */
    @keyframes pop {
      0%   { transform: scale(0.65); opacity: 0.4; }
      70%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    #wordEl.pop {
      animation: pop 0.28s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* loading / error message */
    #msgEl {
      font-size: 28px;
      font-weight: 600;
      color: #555;
      text-align: center;
      padding: 0 40px;
      line-height: 1.5;
      display: none;
    }

    /* ── Refresh button (fixed bottom-right) ─────────────── */
    #refreshBtn {
      position: fixed;
      bottom: 70px;
      right: 18px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      border: none;
      font-size: 72px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #refreshBtn:active {
      background: #333;
      transform: scale(0.93);
    }

    /* ── Settings panel (slides in from right) ───────────── */
    #backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 400;
    }
    #backdrop.open { display: block; }

    #settingsPanel {
      position: fixed;
      top: 0; bottom: 0;
      right: -340px;
      width: 320px;
      background: #fff;
      border-left: 2px solid #000;
      z-index: 500;
      transition: right 0.28s ease;
      display: flex;
      flex-direction: column;
      padding: 30px 28px;
      overflow-y: auto;
    }
    #settingsPanel.open { right: 0; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .panel-header h2 {
      font-size: 22px;
      font-weight: 800;
    }
    #closeBtn {
      width: 44px; height: 44px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #closeBtn:active { background: #f0f0f0; }

    .section-label {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 2px solid #000;
      border-radius: 14px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: background 0.1s;
    }
    .radio-option:active { background: #f0f0f0; }
    .radio-option.selected {
      background: #000;
      color: #fff;
    }
    .radio-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid currentColor;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .radio-dot::after {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      display: none;
    }
    .radio-option.selected .radio-dot::after { display: block; }

    .radio-text { display: flex; flex-direction: column; gap: 2px; }
    .radio-sub { font-size: 13px; font-weight: 400; opacity: 0.65; }

    .panel-divider {
      border: none;
      border-top: 1.5px solid #e0e0e0;
      margin: 22px 0;
    }

    #forceRefreshBtn {
      width: 100%;
      padding: 16px;
      font-size: 19px;
      font-weight: 700;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #forceRefreshBtn:active {
      background: #333;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- Settings button -->
  <button id="settingsBtn" aria-label="設定">⚙️</button>

  <!-- Category label -->
  <div id="catLabel"></div>

  <!-- Word -->
  <div id="wordWrap" role="button" aria-label="撳一下重播" tabindex="0">
    <div id="wordEl"></div>
    <div id="msgEl">載入緊…</div>
  </div>

  <!-- Refresh button -->
  <button id="refreshBtn" aria-label="下一個">↻</button>

  <!-- Settings overlay -->
  <div id="backdrop"></div>
  <div id="settingsPanel" role="dialog" aria-label="設定">
    <div class="panel-header">
      <h2>設定</h2>
      <button id="closeBtn" aria-label="閂設定">✕</button>
    </div>

    <p class="section-label">出題模式：</p>
    <div class="radio-group" id="modeGroup">
      <div class="radio-option" data-mode="cat-seq">
        <span class="radio-dot"></span>
        <span class="radio-text">分類順序
          <span class="radio-sub">同一分類，順住一個一個</span>
        </span>
      </div>
      <div class="radio-option" data-mode="cat-rand">
        <span class="radio-dot"></span>
        <span class="radio-text">分類隨機
          <span class="radio-sub">同一分類，隨機抽</span>
        </span>
      </div>
      <div class="radio-option" data-mode="all-rand">
        <span class="radio-dot"></span>
        <span class="radio-text">全部隨機
          <span class="radio-sub">所有分類一齊抽</span>
        </span>
      </div>
    </div>

    <hr class="panel-divider" />

    <p class="section-label">分類：</p>
    <div class="radio-group" id="catGroup"><!-- dynamic --></div>

    <hr class="panel-divider" />

    <button id="forceRefreshBtn">↻ 重新載入</button>
  </div>

<script>
  /* ── Tunables ───────────────────────────────────────────── */
  const SPEECH_RATE   = 0.6;    // 慢語速
  const SPEECH_PITCH  = 1.1;
  const CHAR_GAP_MS   = 420;    // 每個字之間嘅停頓

  /* ── State ──────────────────────────────────────────────── */
  let categories = [];          // [{name, words:[...]}]
  let allWords   = [];          // [{word, cat}] 供「全部隨機」用
  let currentMode = localStorage.getItem('mode') || 'cat-seq';
  let currentCatIdx = parseInt(localStorage.getItem('catIdx') || '0', 10);
  let seqIdx = -1;              // 分類順序用嘅指標
  let currentWord = '';
  let playToken = 0;           // 中止舊播放

  /* ── DOM refs ───────────────────────────────────────────── */
  const wordEl    = document.getElementById('wordEl');
  const msgEl     = document.getElementById('msgEl');
  const wordWrap  = document.getElementById('wordWrap');
  const catLabel  = document.getElementById('catLabel');
  const refreshBtn= document.getElementById('refreshBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const backdrop  = document.getElementById('backdrop');
  const closeBtn  = document.getElementById('closeBtn');
  const modeGroup = document.getElementById('modeGroup');
  const catGroup  = document.getElementById('catGroup');
  const forceRefreshBtn = document.getElementById('forceRefreshBtn');

  /* ── Voice cache (沿用參考做法) ─────────────────────────── */
  let cachedVoices = [];
  function loadVoices() {
    const v = speechSynthesis.getVoices();
    if (v.length) cachedVoices = v;
  }
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
  loadVoices();

  function getVoices() {
    if (cachedVoices.length) return Promise.resolve(cachedVoices);
    return new Promise(resolve => {
      const handler = () => {
        cachedVoices = speechSynthesis.getVoices();
        resolve(cachedVoices);
      };
      speechSynthesis.addEventListener('voiceschanged', handler, { once: true });
      setTimeout(() => resolve(speechSynthesis.getVoices()), 1000);
    });
  }

  // 揀廣東話聲。新版 macOS/iOS 係 yue-HK「善怡」，舊版係 zh-HK「Sinji」。
  function pickVoice(voices) {
    if (!voices.length) return null;
    // 1. 粵語標準碼 yue-*（最準）
    let v = voices.find(v => v.lang && /^yue/i.test(v.lang));
    if (v) return v;
    // 2. 已知粵語聲名
    v = voices.find(v => /善怡|sinji|cantonese|粵/i.test(v.name));
    if (v) return v;
    // 3. zh-HK 變體
    v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh-hk'));
    return v || null;
  }

  /* ── 逐字朗讀一個字 ─────────────────────────────────────── */
  function speakChar(ch) {
    return new Promise(resolve => {
      if (!window.speechSynthesis) { resolve(); return; }
      const utt = new SpeechSynthesisUtterance(ch);
      const voice = pickVoice(cachedVoices);
      if (voice) utt.voice = voice;
      utt.lang  = (voice && voice.lang) || 'yue-HK';
      utt.rate  = SPEECH_RATE;
      utt.pitch = SPEECH_PITCH;

      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      utt.onend = finish;
      utt.onerror = finish;
      // iOS onend 有時唔觸發 → timeout fallback
      const fallback = Math.max(1200, ch.length * 900);
      setTimeout(finish, fallback);

      speechSynthesis.speak(utt);
    });
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  /* ── 渲染詞語（每個字一個 span）──────────────────────────── */
  function renderWord(word) {
    wordEl.innerHTML = '';
    for (const ch of word) {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      wordEl.appendChild(span);
    }
  }

  function clearHighlight() {
    wordEl.querySelectorAll('.char.active').forEach(s => s.classList.remove('active'));
  }

  /* ── 逐字 highlight + 停頓 + 慢速 朗讀整個詞語 ──────────── */
  async function speakWord(word) {
    const token = ++playToken;
    speechSynthesis.cancel();
    const chars = wordEl.querySelectorAll('.char');
    for (let i = 0; i < chars.length; i++) {
      if (token !== playToken) return;          // 被新播放中止
      clearHighlight();
      chars[i].classList.add('active');
      await speakChar(word[i]);
      if (token !== playToken) return;
      await sleep(CHAR_GAP_MS);                  // 字與字之間停頓
    }
    if (token === playToken) clearHighlight();
  }

  /* ── 顯示一個詞語 ───────────────────────────────────────── */
  function showWord(word) {
    currentWord = word;
    renderWord(word);
    fitToScreen();
    wordEl.classList.remove('pop');
    void wordEl.offsetWidth;
    wordEl.classList.add('pop');
    speakWord(word);
  }

  /* ── 把詞語縮放到啱螢幕 ─────────────────────────────────── */
  function fitToScreen() {
    wordEl.style.fontSize = '';
    const availW = window.innerWidth  * 0.86;
    const availH = window.innerHeight * 0.78;
    const rect = wordEl.getBoundingClientRect();
    if (rect.width <= availW && rect.height <= availH) return;
    const scale = Math.min(availW / rect.width, availH / rect.height);
    const cur = parseFloat(window.getComputedStyle(wordEl).fontSize);
    wordEl.style.fontSize = Math.floor(cur * scale) + 'px';
  }

  /* ── 揀下一個詞語 ───────────────────────────────────────── */
  function pickFromArray(arr, avoid) {
    if (arr.length === 1) return arr[0];
    let w;
    do { w = arr[Math.floor(Math.random() * arr.length)]; }
    while (w === avoid && arr.length > 1);
    return w;
  }

  function nextWord() {
    if (!categories.length) return;
    if (currentMode === 'all-rand') {
      const item = pickFromArray(allWords, currentWord ? {word: currentWord} : null);
      catLabel.textContent = item.cat;
      return item.word;
    }
    const cat = categories[currentCatIdx] || categories[0];
    catLabel.textContent = cat.name;
    if (currentMode === 'cat-rand') {
      return pickFromArray(cat.words, currentWord);
    }
    // cat-seq
    seqIdx = (seqIdx + 1) % cat.words.length;
    return cat.words[seqIdx];
  }

  function showNext() {
    const w = nextWord();
    if (w) showWord(w);
  }

  /* ── 解析 words.txt ─────────────────────────────────────── */
  function parseWords(text) {
    const cats = [];
    let cur = null;
    for (let raw of text.split(/\r?\n/)) {
      const line = raw.trim();
      if (!line || line.startsWith('//')) continue;
      if (line.startsWith('#')) {
        cur = { name: line.replace(/^#+\s*/, ''), words: [] };
        cats.push(cur);
      } else if (cur) {
        cur.words.push(line);
      }
    }
    return cats.filter(c => c.words.length);
  }

  /* ── 設定面板 ───────────────────────────────────────────── */
  function buildCatRadios() {
    catGroup.innerHTML = '';
    categories.forEach((c, i) => {
      const opt = document.createElement('div');
      opt.className = 'radio-option';
      opt.dataset.cat = i;
      opt.innerHTML = '<span class="radio-dot"></span><span class="radio-text">' +
        c.name + '<span class="radio-sub">' + c.words.length + ' 個詞語</span></span>';
      opt.addEventListener('click', () => selectCat(i));
      catGroup.appendChild(opt);
    });
    updateCatUI();
  }
  function updateModeUI() {
    modeGroup.querySelectorAll('.radio-option').forEach(o => {
      o.classList.toggle('selected', o.dataset.mode === currentMode);
    });
  }
  function updateCatUI() {
    catGroup.querySelectorAll('.radio-option').forEach(o => {
      o.classList.toggle('selected', parseInt(o.dataset.cat, 10) === currentCatIdx);
    });
  }
  function selectMode(mode) {
    currentMode = mode;
    localStorage.setItem('mode', mode);
    updateModeUI();
    seqIdx = -1;
    showNext();
  }
  function selectCat(i) {
    currentCatIdx = i;
    localStorage.setItem('catIdx', String(i));
    updateCatUI();
    seqIdx = -1;
    showNext();
  }

  function openSettings()  { settingsPanel.classList.add('open'); backdrop.classList.add('open'); }
  function closeSettings(replay) {
    settingsPanel.classList.remove('open');
    backdrop.classList.remove('open');
    if (replay && currentWord) speakWord(currentWord);
  }

  /* ── Event listeners ────────────────────────────────────── */
  refreshBtn.addEventListener('click', showNext);
  wordWrap.addEventListener('click', () => { if (currentWord) speakWord(currentWord); });
  wordWrap.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { if (currentWord) speakWord(currentWord); }
  });
  settingsBtn.addEventListener('click', openSettings);
  backdrop.addEventListener('click', () => closeSettings(false));
  closeBtn.addEventListener('click', () => closeSettings(true));
  forceRefreshBtn.addEventListener('click', () => location.reload());
  modeGroup.querySelectorAll('.radio-option').forEach(o => {
    o.addEventListener('click', () => selectMode(o.dataset.mode));
  });
  window.addEventListener('resize', fitToScreen);

  /* ── Init ───────────────────────────────────────────────── */
  async function init() {
    try {
      const res = await fetch('words.txt', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      categories = parseWords(text);
      if (!categories.length) throw new Error('words.txt 冇詞語');
    } catch (err) {
      msgEl.style.display = 'block';
      msgEl.innerHTML = '載入 words.txt 失敗 😢<br><span style="font-size:18px">請用網址 (http) 開啟<br>例如 GitHub Pages 或本機 server</span>';
      console.error(err);
      return;
    }

    allWords = [];
    categories.forEach(c => c.words.forEach(w => allWords.push({ word: w, cat: c.name })));
    if (currentCatIdx >= categories.length) currentCatIdx = 0;

    msgEl.style.display = 'none';
    buildCatRadios();
    updateModeUI();

    setTimeout(showNext, 120);
  }

  init();
</script>
</body>
</html>
